<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Guitar Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #121212;
    color: #f2f2f2;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ── 固定ヘッダー ── */
  .app-header {
    flex-shrink: 0;
    padding: env(safe-area-inset-top) 16px 0;
    background: #121212;
    border-bottom: 1px solid #1e1e1e;
    z-index: 10;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 8px;
  }

  /* ── モードタブ ── */
  .mode-tabs {
    display: flex;
    gap: 4px;
    padding: 0 0 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mode-tabs::-webkit-scrollbar { display: none; }

  .mode-tab {
    flex-shrink: 0;
    padding: 7px 10px;
    border-radius: 8px;
    border: none;
    background: #2C2D2F;
    color: #959697;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .mode-tab.active { background: #5865f2; color: #fff; }

  /* ── スクロール可能なコンテンツエリア ── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Card ── */
  .card {
    margin: 16px;
    background: #18191B;
    border-radius: 16px;
    padding: 20px;
    position: relative;
  }

  .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: 0.8rem; color: #959697; margin-bottom: 16px; line-height: 1.5; }

  /* ── Fretboard ── */
  .fretboard-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
    background: #18191B;
    border-radius: 8px;
  }

  .fretboard {
    display: grid;
    grid-template-columns: 30px 44px repeat(12, minmax(36px, 1fr));
    min-width: 600px;
    position: relative;
  }

  .fb-hcell { display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #959697; padding: 4px 2px 8px; }
  .fb-string-name { display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 500; color: #959697; min-height: 52px; }
  .fb-cell, .fb-open-cell { position: relative; display: flex; align-items: center; justify-content: center; min-height: 52px; cursor: pointer; }
  
  /* 弦の横線 */
  .fb-cell::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); z-index: 0; pointer-events: none; }
  .row-0.fb-cell::before, .row-1.fb-cell::before { background: rgba(148,163,184,0.5); height: 1px; }
  .row-2.fb-cell::before { background: rgba(148,163,184,0.55); height: 1.5px; }
  .row-3.fb-cell::before { background: rgba(148,163,184,0.6); height: 2px; }
  .row-4.fb-cell::before { background: rgba(148,163,184,0.65); height: 2.5px; }
  .row-5.fb-cell::before { background: rgba(148,163,184,0.7); height: 3px; }

  .fb-cell::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(148,163,184,0.25); z-index: 1; }
  .fb-nut { position: absolute; top: 0; bottom: 0; right: 0; width: 4px; background: #c9a84c; z-index: 3; border-radius: 2px; }

  .note-dot {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700; color: #fff; position: relative; z-index: 4;
    opacity: 0; transform: scale(0.3); transition: opacity 0.18s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .note-dot.show { opacity: 1; transform: scale(1); }
  .note-dot.p2-show { background: #f97316; box-shadow: 0 0 10px rgba(249,115,22,0.5); }

  /* ── Practice 2 特有のレイアウト ── */
  #panel-practice2 { height: 100%; display: flex; flex-direction: column; }
  .p2-controls-top { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 20px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-label { font-size: 0.72rem; color: #959697; }
  .show-btn { background: #10b981; border: none; border-radius: 8px; color: #fff; font-size: 0.9rem; font-weight: 600; padding: 9px 20px; cursor: pointer; }

  .beat-dot { width: 18px; height: 18px; border-radius: 50%; background: #2C2D2F; border: 2px solid #414243; transition: all .08s; }
  .beat-dot.active-beat { background: #5865f2; border-color: #818cf8; transform: scale(1.3); box-shadow: 0 0 10px rgba(88,101,242,.6); }
  .beat-dot.active-beat.beat-34 { background: #f97316; border-color: #fb923c; }

  /* ── 修正：縦画面（Portrait）での指板隠れ防止 ── */
  #p2-portrait {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── 横画面（Landscape）フルスクリーン ── */
  #p2-landscape {
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    z-index: 1000;
    display: none;
    flex-direction: row;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  @keyframes notePulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .note-pulse { animation: notePulse .18s ease-out; }

</style>
</head>
<body>

<div class="app-header">
  <div class="header">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="width:36px; height:36px; background:#5865f2; border-radius:9px; display:flex; align-items:center; justify-content:center;">🎵</div>
      <span style="font-size:1.1rem; font-weight:700;">Guitar Trainer</span>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab" onclick="location.reload()">フリー</button>
    <button class="mode-tab active" id="tab-practice2">🥁 練習2</button>
  </div>
</div>

<div class="content-area">
  <!-- Practice2 Mode Panel -->
  <div id="panel-practice2">
    
    <!-- 縦画面レイアウト -->
    <div class="card" id="p2-portrait">
      <div>
        <div class="card-title">練習モード 2</div>
        <div class="card-sub">テンポに合わせて各弦のポジションを覚えよう</div>
      </div>

      <div class="p2-controls-top">
        <div class="ctrl-group">
          <span class="ctrl-label">BPM</span>
          <div style="display:flex; align-items:center; gap:8px">
            <input type="range" class="p2-bpm-slider" min="40" max="200" value="80" oninput="syncBpm(this.value)" style="width:100px; accent-color:#5865f2">
            <span class="p2-bpm-val" style="font-weight:700; min-width:30px">80</span>
          </div>
        </div>
        <button class="show-btn p2-start-btn" onclick="togglePractice2()" style="background:#5865f2">▶ スタート</button>
      </div>

      <div class="p2-status" style="display:none; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin-bottom:10px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; align-items:center;">
          <div style="text-align:center; border-right:1px solid #333;">
            <div class="p2-count-label" style="font-size:0.6rem; color:#959697; margin-bottom:4px;">COUNT</div>
            <div style="display:flex; justify-content:center; gap:6px">
              <div class="beat-dot p2-bd" id="bd0"></div>
              <div class="beat-dot p2-bd" id="bd1"></div>
              <div class="beat-dot p2-bd" id="bd2"></div>
              <div class="beat-dot p2-bd" id="bd3"></div>
            </div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:0.6rem; color:#959697; margin-bottom:4px;">TARGET</div>
            <div class="p2-note-display" style="font-size:1.8rem; font-weight:800; color:#f97316;">?</div>
            <div class="p2-string-display" style="font-size:0.75rem; color:#959697;">—</div>
          </div>
        </div>
      </div>

      <div class="fretboard-wrap">
        <div class="fretboard" id="fb-practice2"></div>
      </div>
    </div>
  </div>
</div>

<!-- 横画面レイアウト（オーバーレイ） -->
<div id="p2-landscape">
  <div style="width:180px; padding:20px; border-right:1px solid #222; display:flex; flex-direction:column; justify-content:center; gap:20px;">
    <div>
      <div style="font-size:0.7rem; color:#959697; margin-bottom:8px;">BPM</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="range" class="p2-bpm-slider" min="40" max="200" value="80" oninput="syncBpm(this.value)" style="width:100%; accent-color:#5865f2">
      </div>
      <div class="p2-bpm-val" style="font-size:1.2rem; font-weight:800; text-align:center; margin-top:5px;">80</div>
    </div>
    
    <button class="p2-start-btn" onclick="togglePractice2()" style="padding:12px; background:#5865f2; border:none; border-radius:10px; color:#fff; font-weight:700; cursor:pointer;">▶ START</button>

    <div class="p2-status" style="display:none; text-align:center;">
       <div style="display:flex; justify-content:center; gap:6px; margin-bottom:15px;">
          <div class="beat-dot p2-bd" id="ls-bd0"></div>
          <div class="beat-dot p2-bd" id="ls-bd1"></div>
          <div class="beat-dot p2-bd" id="ls-bd2"></div>
          <div class="beat-dot p2-bd" id="ls-bd3"></div>
       </div>
       <div class="p2-note-display" style="font-size:2.5rem; font-weight:800; color:#f97316;">?</div>
       <div class="p2-string-display" style="font-size:0.8rem; color:#959697;">—</div>
    </div>
  </div>
  <div style="flex:1; display:flex; align-items:center; padding:20px; overflow-x:auto;">
    <div class="fretboard" id="fb-practice2-ls"></div>
  </div>
</div>

<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN_IDX = [4,11,7,2,9,4]; // 1弦〜6弦
const STRING_NAMES = ['E','B','G','D','A','E'];
const FRETS = 12;

let p2Running = false;
let p2TimerIds = [];
let p2BeatCount = 0;
let p2Phase = 'countIn';
let p2CycleStep = 0;
let p2TargetNote = 0;
let p2AudioCtx = null;

function buildBoard(id) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  // Header
  for(let i=0; i<=FRETS+1; i++){
    const h = document.createElement('div');
    h.className = 'fb-hcell';
    h.textContent = i === 0 ? '' : (i === 1 ? '0' : i-1);
    el.appendChild(h);
  }
  // Strings
  for(let s=0; s<6; s++){
    const name = document.createElement('div');
    name.className = 'fb-string-name';
    name.innerHTML = `<span>${STRING_NAMES[s]}</span>`;
    el.appendChild(name);

    for(let f=0; f<=FRETS; f++){
      const cell = document.createElement('div');
      cell.className = (f === 0) ? `fb-open-cell row-${s}` : `fb-cell row-${s}`;
      if(f === 0) {
        const nut = document.createElement('div'); nut.className = 'fb-nut'; cell.appendChild(nut);
      }
      const dot = document.createElement('div');
      dot.className = 'note-dot';
      dot.id = `${id}-s${s}-f${f}`;
      dot.textContent = NOTES[(OPEN_IDX[s]+f)%12];
      cell.appendChild(dot);
      el.appendChild(cell);
    }
  }
}

function syncBpm(v) {
  document.querySelectorAll('.p2-bpm-slider').forEach(s => s.value = v);
  document.querySelectorAll('.p2-bpm-val').forEach(s => s.textContent = v);
}

function togglePractice2() {
  if(!p2AudioCtx) p2AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(p2AudioCtx.state === 'suspended') p2AudioCtx.resume();

  if(p2Running) stopPractice2(); else startPractice2();
}

function startPractice2() {
  p2Running = true;
  p2BeatCount = 0;
  p2Phase = 'countIn';
  p2CycleStep = 0;
  p2TargetNote = Math.floor(Math.random()*12);
  
  document.querySelectorAll('.p2-start-btn').forEach(b => { b.textContent = '■ STOP'; b.style.background = '#ef4444'; });
  document.querySelectorAll('.p2-status').forEach(s => s.style.display = 'block');
  document.querySelectorAll('.p2-note-display').forEach(d => d.textContent = NOTES[p2TargetNote]);

  tick();
}

function stopPractice2() {
  p2Running = false;
  p2TimerIds.forEach(id => clearTimeout(id));
  p2TimerIds = [];
  document.querySelectorAll('.p2-start-btn').forEach(b => { b.textContent = '▶ START'; b.style.background = '#5865f2'; });
  document.querySelectorAll('.p2-status').forEach(s => s.style.display = 'none');
  document.querySelectorAll('.note-dot').forEach(d => d.classList.remove('show', 'p2-show'));
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active-beat', 'beat-34'));
}

function tick() {
  if(!p2Running) return;
  const bpm = parseInt(document.querySelector('.p2-bpm-slider').value);
  const interval = 60000 / bpm;

  const beatInM = p2BeatCount % 4;
  
  // Beat dots
  document.querySelectorAll('.p2-bd').forEach(d => d.classList.remove('active-beat', 'beat-34'));
  ['bd', 'ls-bd'].forEach(p => {
    const d = document.getElementById(p + beatInM);
    if(d) {
      d.classList.add('active-beat');
      if(p2Phase === 'play' && beatInM >= 2) d.classList.add('beat-34');
    }
  });

  // Sound
  const osc = p2AudioCtx.createOscillator();
  const gain = p2AudioCtx.createGain();
  osc.connect(gain); gain.connect(p2AudioCtx.destination);
  osc.frequency.value = beatInM === 0 ? 1000 : 500;
  gain.gain.setValueAtTime(0.1, p2AudioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, p2AudioCtx.currentTime + 0.1);
  osc.start(); osc.stop(p2AudioCtx.currentTime + 0.1);

  if(p2Phase === 'play') {
    const si = [5,4,3,2,1,0][p2CycleStep]; // 6弦から
    document.querySelectorAll('.p2-string-display').forEach(d => d.textContent = `${6-si}弦 (${STRING_NAMES[si]})`);
    
    if(beatInM === 2) { // 3拍目で表示
      document.querySelectorAll('.note-dot').forEach(d => d.classList.remove('show', 'p2-show'));
      [ 'fb-practice2', 'fb-practice2-ls' ].forEach(boardId => {
        for(let f=0; f<=FRETS; f++) {
          if((OPEN_IDX[si]+f)%12 === p2TargetNote) {
            const dot = document.getElementById(`${boardId}-s${si}-f${f}`);
            if(dot) dot.classList.add('show', 'p2-show');
          }
        }
      });
      // Pulse
      document.querySelectorAll('.p2-note-display').forEach(n => {
        n.classList.remove('note-pulse'); void n.offsetWidth; n.classList.add('note-pulse');
      });
    }
    
    if(beatInM === 3) {
      p2CycleStep++;
      if(p2CycleStep >= 6) {
        p2CycleStep = 0; p2Phase = 'countIn';
        p2TargetNote = Math.floor(Math.random()*12);
        document.querySelectorAll('.p2-note-display').forEach(d => d.textContent = NOTES[p2TargetNote]);
      }
    }
  }

  p2BeatCount++;
  if(p2Phase === 'countIn' && p2BeatCount >= 4) {
    p2Phase = 'play'; p2BeatCount = 0;
  }

  p2TimerIds.push(setTimeout(tick, interval));
}

function checkLayout() {
  const isLS = window.innerWidth > window.innerHeight && window.innerWidth < 1024;
  document.getElementById('p2-landscape').style.display = isLS ? 'flex' : 'none';
  document.getElementById('p2-portrait').style.display = isLS ? 'none' : 'flex';
}

window.addEventListener('resize', checkLayout);
window.onload = () => {
  buildBoard('fb-practice2');
  buildBoard('fb-practice2-ls');
  checkLayout();
};
</script>
</body>
</html>
